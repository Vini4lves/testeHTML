<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema Garçom</title>

<style>

body{
font-family: Arial;
padding:20px;
background:#f2f2f2;
}

h2{
text-align:center;
}

input, button{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
}

button{
background:#28a745;
color:white;
border:none;
border-radius:5px;
}

button:hover{
background:#218838;
}

.lista{
margin-top:20px;
}

.produto{
display:flex;
justify-content:space-between;
background:white;
padding:10px;
margin-top:5px;
border-radius:5px;
}

.remover{
background:red;
padding:5px 10px;
border-radius:3px;
}

</style>
</head>

<body>

<h2>Novo Pedido</h2>

<label>Mesa</label>
<input type="number" id="mesa">

<label>Cliente</label>
<input type="text" id="cliente">

<label>Produto</label>
<input type="text" id="produto">

<button onclick="adicionarProduto()">Adicionar Produto</button>

<div class="lista" id="lista"></div>

<button onclick="enviarWhatsApp()">Enviar Pedido no WhatsApp</button>

<script>

let produtos = [];

function adicionarProduto(){

let produto = document.getElementById("produto").value;

if(produto.trim()=="") return;

produtos.push(produto);

document.getElementById("produto").value="";

mostrarProdutos();

}

function mostrarProdutos(){

let lista = document.getElementById("lista");

lista.innerHTML="";

produtos.forEach((p,i)=>{

lista.innerHTML += `
<div class="produto">
<span>${p}</span>
<button class="remover" onclick="remover(${i})">X</button>
</div>
`;

});

}

function remover(i){

produtos.splice(i,1);

mostrarProdutos();

}

function enviarWhatsApp(){

let mesa = document.getElementById("mesa").value;
let cliente = document.getElementById("cliente").value;

let mensagem = "📋 PEDIDO\n\n";
mensagem += "Mesa: " + mesa + "\n";
mensagem += "Cliente: " + cliente + "\n\n";

produtos.forEach(p=>{
mensagem += "- " + p + "\n";
});

let hora = new Date().toLocaleTimeString();
mensagem += "\n🕒 " + hora;

let url = "https://wa.me/?text=" + encodeURIComponent(mensagem);

window.open(url,"_blank");

}

</script>

</body>
</html>
